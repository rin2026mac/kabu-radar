<head>

<title>KABU RADAR</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0f1a;color:#e8eaf2;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px;line-height:1.55}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 60px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
h1{font-size:18px;letter-spacing:.06em}
h1 span{color:#818cf8}
.gen{font-size:11px;color:#6b7280}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:10px;border:1px solid #2a3148;background:#131a2c;color:#9ca3af;font-size:14px;font-weight:600;cursor:pointer}
.tab.on{background:#27316e;border-color:#4f5fd7;color:#fff}
.panel{background:#111726;border:1px solid #232c44;border-radius:14px;padding:14px;margin-bottom:12px}
.kick{font-size:10.5px;letter-spacing:.1em;color:#64748b;text-transform:uppercase;margin-bottom:6px}
.verdict{font-size:16px;font-weight:700;margin-bottom:4px}
.verdict.offense{color:#34d399}.verdict.caution{color:#fbbf24}.verdict.defense{color:#fb7185}
.vdetail{font-size:12.5px;color:#94a3b8}
.meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:12px;color:#94a3b8}
.meta b{color:#e8eaf2}
.row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid #1c2438;text-decoration:none;color:inherit}
.row:last-child{border-bottom:none}
.rank{width:24px;font-size:12px;color:#475569;font-variant-numeric:tabular-nums}
.rmain{flex:1;min-width:0}
.rmain b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmain span{font-size:11.5px;color:#64748b}
.badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:1px}
.b-fresh{background:#34d399;color:#04342c}
.b-rs{background:#1e3a8a;color:#93c5fd}
.score{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:#c7d2fe}
.ext{font-size:11.5px;color:#94a3b8;font-variant-numeric:tabular-nums;width:74px;text-align:right}
.pos-card{border-radius:11px;border:1px solid #232c44;padding:11px 12px;margin-bottom:8px}
.pos-card.danger{border-color:#9f1239;background:#2d0a14}
.pos-card.profit{border-color:#065f46;background:#06231c}
.pos-card.warning{border-color:#92600a;background:#271c06}
.pos-top{display:flex;justify-content:space-between;align-items:baseline}
.pos-top b{font-size:14.5px}
.gain{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
.gain.up{color:#34d399}.gain.down{color:#fb7185}
.action{font-size:12.5px;font-weight:700;margin-top:3px}
.danger .action{color:#fda4af}.profit .action{color:#6ee7b7}.warning .action{color:#fcd34d}.ok .action,.info .action{color:#94a3b8}
.pos-meta{font-size:11px;color:#64748b;margin-top:4px;font-variant-numeric:tabular-nums}
.bt{font-size:12px;color:#94a3b8;font-variant-numeric:tabular-nums}
.bt b{color:#e8eaf2}
.empty{color:#64748b;font-size:13px;padding:6px 2px}
footer{font-size:10.5px;color:#475569;text-align:center;margin-top:24px;line-height:1.8}
#lock{max-width:340px;margin:80px auto;text-align:center}
#lock p{font-size:13px;color:#94a3b8;margin-bottom:14px}
#lock input{width:100%;padding:12px;border-radius:10px;border:1px solid #2a3148;background:#131a2c;color:#fff;font-size:16px;margin-bottom:10px;text-align:center}
#lock button{width:100%;padding:12px;border-radius:10px;border:1px solid #4f5fd7;background:#27316e;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
#lockmsg{color:#fb7185;font-size:12.5px;margin-top:10px;min-height:1em}
</style>
</head>

const RAW = null;
let DATA = null;
function esc(s){return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function num(v,d){return v==null?'—':Number(v).toFixed(d)}
function verdict(ctx){
  const r = ctx && ctx.regime;
  if(r==='confirmed_uptrend')return{cls:'offense',t:'攻め時 — 上昇トレンド',d:'新規エントリー許可。候補を上から攻略'};
  if(r==='uptrend_pressure')return{cls:'caution',t:'警戒 — 上値圧力',d:'サイズ半分、ブレイク直後のみ'};
  if(r==='correction')return{cls:'defense',t:'守り — 調整局面',d:'新規買い停止。保有の売りルール最優先'};
  return{cls:'caution',t:'判定待ち',d:'データ更新後に表示'};
}
function name(it,mkt){return mkt==='JP' ? (it.n||String(it.t).replace('.T','')) : it.t}
function show(mkt){
  localStorage.setItem('kabu-mkt',mkt);
  document.getElementById('tab-US').className = 'tab'+(mkt==='US'?' on':'');
  document.getElementById('tab-JP').className = 'tab'+(mkt==='JP'?' on':'');
  const m = DATA.markets[mkt]; if(!m){document.getElementById('root').innerHTML='<p class="empty">データなし</p>';return}
  const v = verdict(m.context);
  const dist = m.context && m.context.distribution_days;
  let html = '<section class="panel"><p class="kick">本日の作戦</p>'
    + '<p class="verdict '+v.cls+'">'+esc(v.t)+'</p><p class="vdetail">'+esc(v.d)+'</p>'
    + '<div class="meta"><span>候補 <b>'+m.items.length+'</b></span>'
    + (dist!=null?'<span>分配日 <b>'+dist+'</b>/25</span>':'')
    + '<span>売り警報 <b>'+((m.counts&&m.counts['Sell candidates'])||0)+'</b></span>'
    + '<span>基準日 <b>'+esc(m.as_of||'—')+'</b></span></div></section>';

  const pos = (DATA.positions||[]).filter(p=>p.m===mkt);
  if(pos.length){
    html += '<section class="panel"><p class="kick">保有ポジション</p>';
    const order={danger:0,warning:1,profit:2,info:3,ok:4};
    pos.sort((a,b)=>(order[a.u]??9)-(order[b.u]??9));
    for(const p of pos){
      html += '<div class="pos-card '+esc(p.u||'ok')+'">'
        + '<div class="pos-top"><b>'+esc(mkt==='JP'?(p.n||p.t.replace('.T','')):p.t)+'</b>'
        + '<span class="gain '+((p.g??0)>=0?'up':'down')+'">'+((p.g??0)>=0?'+':'')+num(p.g,1)+'%</span></div>'
        + '<p class="action">'+esc(p.a||'—')+'</p>'
        + '<p class="pos-meta">'+esc(p.bd)+' @ '+p.bp+' ・ 終値 '+(p.c??'—')+' ・ ストップ '+(p.stop??'—')+'</p></div>';
    }
    html += '</section>';
  }

  const entries = m.items.filter(i=>(i.es??0)>=48).sort((a,b)=>(b.es??0)-(a.es??0)).slice(0,12);
  html += '<section class="panel"><p class="kick">今日のエントリー候補(終値ベース)</p>';
  if(!entries.length) html += '<p class="empty">条件を満たす候補なし</p>';
  entries.forEach((it,i)=>{
    html += '<div class="row"><span class="rank">'+String(i+1).padStart(2,'0')+'</span>'
      + '<div class="rmain"><b>'+esc(name(it,mkt))
      + (it.fb?'<span class="badge b-fresh">直後</span>':'')
      + ((it.rs??0)>=80?'<span class="badge b-rs">RS '+it.rs+'</span>':'')
      + '</b><span>'+esc(it.el||'')+'</span></div>'
      + '<span class="ext">ピボット'+(it.ext!=null?((it.ext>=0?'+':'')+num(it.ext,1)+'%'):'—')+'</span>'
      + '<span class="score">'+(it.es??'—')+'</span></div>';
  });
  html += '</section>';

  html += '<section class="panel"><p class="kick">上位銘柄</p>';
  m.items.slice(0,40).forEach((it,i)=>{
    html += '<div class="row"><span class="rank">'+(i+1)+'</span>'
      + '<div class="rmain"><b>'+esc(name(it,mkt))
      + (it.fb?'<span class="badge b-fresh">直後</span>':'')
      + ((it.rs??0)>=80?'<span class="badge b-rs">RS '+it.rs+'</span>':'')
      + '</b><span>'+esc(mkt==='JP'?it.t:(it.n||''))+'</span></div>'
      + '<span class="score">'+(it.s??'—')+'</span></div>';
  });
  html += '</section>';

  if(m.backtest){
    const b = m.backtest;
    html += '<section class="panel"><p class="kick">ルール検証(3年)</p><p class="bt">リターン <b>'
      + ((b.ret??0)>=0?'+':'')+num(b.ret,1)+'%</b> ・ 勝率 <b>'+num(b.win,0)+'%</b> ・ PF <b>'
      + num(b.pf,2)+'</b> ・ 最大DD <b>-'+num(b.dd,1)+'%</b> ・ '+(b.n??'—')+'回</p></section>';
  }
  document.getElementById('root').innerHTML = html;
}
function boot(d){
  DATA = d;
  document.getElementById('gen').textContent = '更新 ' + d.generated;
  document.getElementById('lock').style.display = 'none';
  document.getElementById('main').style.display = '';
  show(localStorage.getItem('kabu-mkt')||'JP');
}
async function tryDecrypt(pass){
  const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b(ENC.salt), iterations:200000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(ENC.iv)}, key, b(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  const p = document.getElementById('pass').value;
  if(!p) return;
  document.getElementById('lockmsg').textContent = '確認中…';
  try{
    const d = await tryDecrypt(p);
    localStorage.setItem('kabu-pass', p);
    boot(d);
  }catch(e){
    document.getElementById('lockmsg').textContent = 'パスフレーズが違います';
  }
}
document.getElementById('pass').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
(async () => {
  if(RAW){ boot(RAW); return; }
  const saved = localStorage.getItem('kabu-pass');
  if(saved){
    try{ boot(await tryDecrypt(saved)); return; }catch(e){ localStorage.removeItem('kabu-pass'); }
  }
  document.getElementById('main').style.display = 'none';
  document.getElementById('lock').style.display = '';
})();
</script>
